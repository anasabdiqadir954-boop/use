         <h1 style="text-align: center;">Gym Membership <br> Registration form</h1> <br>

        </p>

     <div class="cardd">  
        <form>
            <fieldset>

        <p>
        <label for="Full name:">Full name:</label><br>
        <input type="text" name="Full name" id="full name" placeholder="Enter your full name">
        </p>

     <p>
        <label for="Last name:">Last name:</label><br>
        <input type="text" name="last name" id="last name" placeholder="Enter your last name">
        </p>

    <p>
        <label for="Date of Birth:">Date of Birth:</label><br>
        <input type="date" name="Date of Birth" id="Date of Birth" placeholder="dd/mm/yyyy" required>
        </p>
        <p>
            <label for="Phone number:">Phone number:</label><br>
            <input type="tell" name="mobile:" id="mobile:" placeholder="Enter your phone number">
        </p>

        <p>
            <label for="Email Address:">Email Address:</label><br>
            <input type="text" name="Email Address:" id="Email Address:" placeholder="Enter your email address">
        </p>

    <p>
        <label for="Home Address:">Home Address:</label><br>
        <input type="text" name="Home Address" id="Home Address" placeholder="Enter your home address">
    </p>
        <p>
            <label for="Gender:">Gender:</label><br>
            <input type="radio" name="Gender" id="Gender">
            <label for="Male">Male</label>
             <input type="radio" name="Gender" id="Gender">
            <label for="Female">Female</label>
          </p>
        
             
            <button type="Submit Registration">Submit Registration</button required>
            
        </fieldset>
